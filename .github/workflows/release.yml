name: Android Release

on:
  push:
    branches: [ master ]
    paths:
      - 'android/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release version, for example 1.2.0. Leave empty for automatic build version.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-master
  cancel-in-progress: false

jobs:
  release:
    name: Build signed APK and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Determine release version
        env:
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_VERSION=$(grep 'val mimoVersionName' android/app/build.gradle.kts | sed -E 's/.*\?: "([^"]+)".*/\1/')
          if [ -n "${INPUT_VERSION_NAME:-}" ]; then
            VERSION_NAME="$INPUT_VERSION_NAME"
          else
            VERSION_PREFIX=$(echo "$SOURCE_VERSION" | awk -F. '{print $1"."$2}')
            VERSION_NAME="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}"
          fi

          if ! echo "$VERSION_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must use numeric semantic version format, for example 1.2.0"
            exit 1
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "TAG_NAME=v$VERSION_NAME" >> "$GITHUB_ENV"
          echo "APK_NAME=mimoChat-$VERSION_NAME.apk" >> "$GITHUB_ENV"

      - name: Normalize and validate signing secrets
        env:
          RAW_RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RAW_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RAW_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RAW_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          normalize_secret() {
            local name="$1"
            local value="$2"

            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            if [[ "$value" == "$name="* ]]; then
              value="${value#"$name="}"
            fi

            if [ "$name" = "RELEASE_KEYSTORE_BASE64" ]; then
              value=$(printf '%s' "$value" | tr -d '[:space:]')
            else
              value=$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            fi

            if [ -z "$value" ]; then
              echo "::error::Missing repository secret: $name. See RELEASE.md."
              exit 1
            fi

            echo "::add-mask::$value"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          }

          normalize_secret RELEASE_KEYSTORE_BASE64 "$RAW_RELEASE_KEYSTORE_BASE64"
          normalize_secret RELEASE_STORE_PASSWORD "$RAW_RELEASE_STORE_PASSWORD"
          normalize_secret RELEASE_KEY_ALIAS "$RAW_RELEASE_KEY_ALIAS"
          normalize_secret RELEASE_KEY_PASSWORD "$RAW_RELEASE_KEY_PASSWORD"

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/mimochat-release.jks
          chmod 600 android/mimochat-release.jks
          KS_SIZE=$(wc -c < android/mimochat-release.jks)
          echo "Decoded keystore size: $KS_SIZE bytes"
          if [ "$KS_SIZE" -lt 100 ]; then
            echo "::error::Decoded keystore is too small ($KS_SIZE bytes). The RELEASE_KEYSTORE_BASE64 secret may be empty or truncated."
            xxd android/mimochat-release.jks | head -5
            exit 1
          fi

      - name: Verify keystore credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-logs /tmp/mimochat-sign-check

          if ! keytool -list \
            -storetype JKS \
            -keystore android/mimochat-release.jks \
            -storepass "$RELEASE_STORE_PASSWORD" \
            -alias "$RELEASE_KEY_ALIAS" \
            >release-logs/keytool.log 2>&1; then
            cat release-logs/keytool.log
            echo "::error::Release keystore, store password, or alias does not match. The workflow accepts either a raw value or NAME=value."
            exit 1
          fi

          jar --create --file /tmp/mimochat-sign-check.jar -C /tmp/mimochat-sign-check .
          if ! jarsigner \
            -storetype JKS \
            -keystore android/mimochat-release.jks \
            -storepass "$RELEASE_STORE_PASSWORD" \
            -keypass "$RELEASE_KEY_PASSWORD" \
            /tmp/mimochat-sign-check.jar \
            "$RELEASE_KEY_ALIAS" \
            >release-logs/jarsigner.log 2>&1; then
            cat release-logs/jarsigner.log
            echo "::error::Release key password does not match the private key."
            exit 1
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          MIMO_VERSION_NAME: ${{ env.VERSION_NAME }}
          MIMO_VERSION_CODE: ${{ env.VERSION_CODE }}
          RELEASE_STORE_FILE: ${{ github.workspace }}/android/mimochat-release.jks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../release-logs
          ./gradlew clean assembleRelease --no-daemon --stacktrace 2>&1 | tee ../release-logs/assembleRelease.log

      - name: Run unit tests
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee ../release-logs/testDebugUnitTest.log

      - name: Run release lint
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew lintRelease --no-daemon --stacktrace 2>&1 | tee ../release-logs/lintRelease.log

      - name: Verify APK signature
        shell: bash
        run: |
          set -euo pipefail
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk \
            2>&1 | tee release-logs/apksigner.log

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release-logs/
            android/app/build/reports/lint-results-release.html
            android/app/build/reports/tests/
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/$APK_NAME"
          sha256sum "dist/$APK_NAME" > "dist/$APK_NAME.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "dist/$APK_NAME" "dist/$APK_NAME.sha256" --clobber
            gh release edit "$TAG_NAME" --title "MiMo Chat $VERSION_NAME" --latest
          else
            gh release create "$TAG_NAME" \
              "dist/$APK_NAME" \
              "dist/$APK_NAME.sha256" \
              --title "MiMo Chat $VERSION_NAME" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              --latest
          fi

      - name: Remove decoded keystore
        if: always()
        run: rm -f android/mimochat-release.jks /tmp/mimochat-sign-check.jar
