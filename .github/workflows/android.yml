name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build.log

      - name: Upload Gradle failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-failure
          path: android/gradle-build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Run Unit Tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon --continue

      - name: Run Lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mimoChat-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: android/app/build/reports/tests/
          retention-days: 7

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-debug.html
          retention-days: 7
